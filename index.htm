<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采蓉留影與生命藍圖</title>
    <style>
        /* 整體風格設定 */
        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: #0f141d url('https://www.transparenttextures.com/patterns/stardust.png'); /* 星空微粒背景 */
            color: #e0e6ed;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 頁首與標題 */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to bottom, #161f30, #0f141d);
            border-bottom: 2px solid #c9a063; /* 古風金邊 */
        }

        header h1 {
            font-size: 2.5rem;
            color: #c9a063;
            margin: 0 0 10px 0;
            letter-spacing: 4px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        header p {
            font-size: 1rem;
            color: #8da2bb;
            margin: 0;
            font-style: italic;
        }

        /* 分頁導覽列 */
        nav {
            display: flex;
            justify-content: center;
            background-color: #161f30;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #23334c;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8da2bb;
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            font-weight: bold;
        }

        .tab-btn:hover {
            color: #c9a063;
        }

        .tab-btn.active {
            color: #c9a063;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            width: 60%;
            height: 3px;
            background-color: #c9a063;
            border-radius: 2px;
        }

        /* 主體內容區 */
        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 相簿網格佈局 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            justify-content: center;
        }

        /* 特定分頁微調：命盤照片較大，改成兩欄或單欄更易閱讀 */
        #blueprint .gallery-grid {
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        }

        /* 相片卡片樣式 */
        .photo-card {
            background-color: #1a2333;
            border: 1px solid #23334c;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(201, 160, 99, 0.2);
            border-color: #c9a063;
        }

        .photo-wrapper {
            position: relative;
            width: 100%;
            padding-top: 135%; /* 適合直式照片的比例 */
            background-color: #0b0f17;
        }

        /* 調整命盤分頁的圖片比例，使其更完整呈現 */
        #blueprint .photo-wrapper {
            padding-top: 125%; 
        }

        .photo-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .photo-card:hover .photo-wrapper img {
            transform: scale(1.03);
        }

        .photo-info {
            padding: 15px 20px;
            border-top: 1px solid #23334c;
        }

        .photo-title {
            font-size: 1.1rem;
            color: #c9a063;
            margin: 0 0 5px 0;
            font-weight: 600;
        }

        .photo-desc {
            font-size: 0.9rem;
            color: #8da2bb;
            margin: 0;
            line-height: 1.4;
        }

        /* 燈箱彈出視窗 (LightBox) */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(7, 10, 15, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85vh;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 2px solid #c9a063;
            border-radius: 4px;
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); }
            to { transform: scale(1); }
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #e0e6ed;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }

        .lightbox-close:hover {
            color: #c9a063;
        }

        /* 頁尾 */
        footer {
            text-align: center;
            padding: 40px 20px;
            color: #566a82;
            font-size: 0.85rem;
            border-top: 1px solid #161f30;
            margin-top: 60px;
        }
    </style>
</head>
<body>

    <!-- 網頁頁首 -->
    <header>
        <h1>采蓉網頁</h1>
        <p>在歷史長河中尋找，那一抹來自盛世的光</p>
    </header>

    <!-- 分頁導覽 -->
    <nav>
        <button class="tab-btn active" onclick="switchTab('cairong-gallery')">采蓉留影</button>
        <button class="tab-btn" onclick="switchTab('blueprint')">生命藍圖</button>
    </nav>

    <!-- 主要內容區 -->
    <main>
        
        <!-- 分頁一：采蓉留影 (漢服照片) -->
        <section id="cairong-gallery" class="tab-content active">
            <div class="gallery-grid">
                
                <!-- 照片 1 -->
                <div class="photo-card" onclick="openLightbox('1778917738823.png')">
                    <div class="photo-wrapper">
                        <img src="1778917738823.png" alt="歷史的迴響">
                    </div>
                    <div class="photo-info">
                        <h3 class="photo-title">歷史的迴響</h3>
                        <p class="photo-desc">The Chronicles of Ancient China ── 歲月沉澱的古典畫卷。</p>
                    </div>
                </div>

                <!-- 照片 2 -->
                <div class="photo-card" onclick="openLightbox('file_00000000a0587206904f951ad3e23f32.png')">
                    <div class="photo-wrapper">
                        <img src="file_00000000a0587206904f951ad3e23f32.png" alt="夢回大唐">
                    </div>
                    <div class="photo-info">
                        <h3 class="photo-title">夢回大唐</h3>
                        <p class="photo-desc">盛世如詩，人心如燈。尋一抹來自盛世的光。</p>
                    </div>
                </div>

            </div>
        </section>

        <!-- 分頁二：生命藍圖 (命盤照片) -->
        <section id="blueprint" class="tab-content">
            <div class="gallery-grid">
                
                <!-- 照片 3 -->
                <div class="photo-card" onclick="openLightbox('a337128e6769e16b30be22ae1541937f9e934b32848d6f67f3572841be58ab46.png')">
                    <div class="photo-wrapper">
                        <img src="a337128e6769e16b30be22ae1541937f9e934b32848d6f67f3572841be58ab46.png" alt="你的身份藍圖">
                    </div>
                    <div class="photo-info">
                        <h3 class="photo-title">第一章：身份藍圖</h3>
                        <p class="photo-desc">核心特質、強項與情緒盲點分析。</p>
                    </div>
                </div>

                <!-- 照片 4 -->
                <div class="photo-card" onclick="openLightbox('4184ad42a6bc9da1551cc75ea5a2aa810d96f567c8c67a2c25bd1c45224815df.png')">
                    <div class="photo-wrapper">
                        <img src="4184ad42a6bc9da1551cc75ea5a2aa810d96f567c8c67a2c25bd1c45224815df.png" alt="7年一個循環：你的人生時間軸">
                    </div>
                    <div class="photo-info">
                        <h3 class="photo-title">第二章：人生時間軸</h3>
                        <p class="photo-desc">七年一循環的成長軌跡與未來預測。</p>
                    </div>
                </div>

                <!-- 照片 5 -->
                <div class="photo-card" onclick="openLightbox('0034578c3bb1c813e835718a4778d3a2985d120906c12bbf5b7b65bc6962f414.png')">
                    <div class="photo-wrapper">
                        <img src="0034578c3bb1c813e835718a4778d3a2985d120906c12bbf5b7b65bc6962f414.png" alt="你的人生故事篇章">
                    </div>
                    <div class="photo-info">
                        <h3 class="photo-title">第三章：人生故事篇章</h3>
                        <p class="photo-desc">轉變時刻與持續成長的關鍵智慧。</p>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <!-- 燈箱彈出視窗結構 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightbox-img" class="lightbox-content" src="" alt="放大照片">
    </div>

    <!-- 頁尾 -->
    <footer>
        <p>&copy; 2026 采蓉留影簿 · 在自由與變化中建立生命的秩序</p>
    </footer>

    <!-- 前端互動腳本 -->
    <script>
        // 分頁切換功能
        function switchTab(tabId) {
            // 隱藏所有分頁內容
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            
            // 取消所有按鈕的 active 樣式
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // 顯示當前點擊的分頁與啟用按鈕樣式
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 開啟大圖燈箱
        function openLightbox(imgSrc) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = imgSrc;
            lightbox.classList.add('active');
        }

        // 關閉大圖燈箱
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
        }
    </script>
</body>
</html>
